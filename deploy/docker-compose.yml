services:
  backend:
    build:
      context: ..
      dockerfile: Dockerfile
    env_file:
      - ./env.local
    volumes:
      - ../data:/app/backend/data
    expose:
      - "8000"
    restart: unless-stopped

  web:
    build:
      context: ..
      dockerfile: deploy/frontend.Dockerfile
    depends_on:
      - backend
    ports:
      - "127.0.0.1:8080:80"
    restart: unless-stopped
